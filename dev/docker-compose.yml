version: "3.7"
services:
  vault:
    image: hashicorp/vault
    ports:
      - 127.0.0.1:8200:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - ./pki:/pki
    networks:
      - default
  broker:
    depends_on: [vault]
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        - COMPONENT=beam-broker
    image: samply/beam-broker:${TAG:-localbuild}
    ports:
      - 8080:8080
      - 8090:8090
    environment:
      BROKER_URL: ${BROKER_URL}
      PKI_ADDRESS: http://vault:8200
      no_proxy: vault
      NO_PROXY: vault
      PRIVKEY_FILE: /run/secrets/dummy.pem
      BIND_ADDR: 0.0.0.0:8080
      MONITORING_API_KEY: ${BROKER_MONITORING_KEY}
      RUST_LOG: ${RUST_LOG}
      # ALL_PROXY: http://mitmproxy:8080
    secrets:
      - pki.secret
      - dummy.pem
      - root.crt.pem
  # mitmproxy:
  #   image: mitmproxy/mitmproxy
  #   stop_signal: SIGKILL
  #   command: mitmweb --web-host 0.0.0.0 --web-port 9090
  #   ports:
  #     - 9090:9090
  proxy1:
    depends_on: [broker]
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        - COMPONENT=beam-proxy
    image: samply/beam-proxy:${TAG:-localbuild}
    ports:
      - 8081:8081
    environment:
      BROKER_URL: ${BROKER_URL}
      PROXY_ID: ${PROXY1_ID}
      APP_app1_KEY: ${APP_KEY}
      APP_app2_KEY: ${APP_KEY}
      PRIVKEY_FILE: /run/secrets/proxy1.pem
      BIND_ADDR: 0.0.0.0:8081
      RUST_LOG: ${RUST_LOG}
      # ALL_PROXY: http://mitmproxy:8080
    secrets:
      - proxy1.pem
      - root.crt.pem
  proxy2:
    depends_on: [broker]
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        - COMPONENT=beam-proxy
    image: samply/beam-proxy:${TAG:-localbuild}
    ports:
      - 8082:8082
    environment:
      BROKER_URL: ${BROKER_URL}
      PROXY_ID: ${PROXY2_ID}
      APP_app1_KEY: ${APP_KEY}
      APP_app2_KEY: ${APP_KEY}
      PRIVKEY_FILE: /run/secrets/proxy2.pem
      BIND_ADDR: 0.0.0.0:8082
      RUST_LOG: ${RUST_LOG}
      # ALL_PROXY: http://mitmproxy:8080
    secrets:
      - proxy2.pem
      - root.crt.pem

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI
    profiles:
      - cert-manager

  cert-ui:
    image: samply/beam-cert-manager
    ports:
      - 8000:8000
      - 3000:3000
    environment:
      BROKER_URL: http://broker:8080
      VAULT_URL: http://vault:8200
      CSR_DIR: /pki
      SMTP_URL: smtp://mailhog:1025
      DB_DIR: /pki/db
      BROKER_MONITORING_KEY: ${BROKER_MONITORING_KEY}
      PKI_DEFAULT_ROLE: hd-dot-dktk-dot-com
      PUBLIC_BASE_URL: http://localhost:3000
      ADMIN_ADDR: 0.0.0.0:8000
      BROKER_ID: broker
      RUST_LOG: ${RUST_LOG}
    volumes:
      - ./pki:/pki
    secrets:
      - pki.secret
    depends_on:
      - vault
      - broker
      - mailhog
    profiles:
      - cert-manager

secrets:
  pki.secret:
    file: ./pki/pki.secret
  proxy1.pem:
    file: ./pki/${PROXY1_ID_SHORT}.priv.pem
  proxy2.pem:
    file: ./pki/${PROXY2_ID_SHORT}.priv.pem
  dummy.pem:
    file: ./pki/dummy.priv.pem
  root.crt.pem:
    file: ./pki/root.crt.pem
